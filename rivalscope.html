<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RivalScope - AI Competitive Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');
        
        :root {
            --brand-color: #8eadfa;
            --brand-hover: #7a99e8;
        }

        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            background-color: #f0f0e8; 
            word-break: keep-all;
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(12px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .loading-spinner {
            border: 3px solid rgba(142, 173, 250, 0.2);
            border-top: 3px solid var(--brand-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">

<div class="w-full max-w-6xl bg-[#f7f7f0] rounded-2xl shadow-2xl border border-gray-200 overflow-hidden flex flex-col min-h-[85vh]">
    <header class="bg-white border-b border-gray-200 p-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="bg-[#8eadfa] text-white font-bold p-1.5 px-3 rounded-lg text-lg shadow-sm">RS</div>
            <div>
                <h1 class="text-xl font-bold text-gray-800 leading-none">RivalScope</h1>
                <p class="text-gray-400 text-[10px] mt-1 font-bold tracking-widest uppercase">AI-Powered Intelligence</p>
            </div>
        </div>
        <span class="hidden md:block text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded-full font-bold uppercase">Internal Alpha v0.8</span>
    </header>

    <div class="flex flex-1 flex-col md:flex-row overflow-hidden">
        <aside class="w-full md:w-80 bg-white border-r border-gray-200 p-6 flex flex-col gap-6">
            <section>
                <h2 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-5">Research Settings</h2>
                
                <div class="space-y-5">
                    <div>
                        <label for="gameName" class="block text-sm font-bold text-gray-700 mb-2">경쟁 게임명 <span class="text-red-400">*</span></label>
                        <input id="gameName" type="text" placeholder="예: 원신, 로스트아크" 
                               class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#8eadfa] focus:border-transparent outline-none transition-all">
                    </div>
                    
                    <div>
                        <label for="gameGenre" class="block text-sm font-bold text-gray-700 mb-2">장르</label>
                        <select id="gameGenre" class="w-full border border-gray-300 rounded-xl p-3 text-sm bg-gray-50 outline-none focus:ring-2 focus:ring-[#8eadfa]">
                            <option value="수집형 RPG">수집형 RPG</option>
                            <option value="MMORPG">MMORPG</option>
                            <option value="액션/어드벤처">액션/어드벤처</option>
                            <option value="시뮬레이션">시뮬레이션</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">분석 중점 항목</label>
                        <div class="space-y-2 text-sm">
                            <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                                <input type="radio" name="focus" value="전반적 분석" checked class="w-4 h-4 accent-[#8eadfa]">
                                <span class="text-gray-600">전반적 분석</span>
                            </label>
                            <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                                <input type="radio" name="focus" value="과금 모델(BM)" class="w-4 h-4 accent-[#8eadfa]">
                                <span class="text-gray-600">과금 모델(BM)</span>
                            </label>
                            <label class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                                <input type="radio" name="focus" value="유저 리뷰" class="w-4 h-4 accent-[#8eadfa]">
                                <span class="text-gray-600">유저 리뷰 감성</span>
                            </label>
                        </div>
                    </div>
                </div>
            </section>

            <button id="startBtn" onclick="RivalScope.start()" class="mt-auto w-full bg-[#8eadfa] hover:bg-[#7a99e8] text-white font-bold py-4 rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-blue-100 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                분석 시작하기
            </button>
        </aside>

        <main id="mainContent" class="flex-1 p-6 md:p-10 overflow-y-auto bg-[#f7f7f0] relative">
            
            <div id="state-empty" class="h-full flex flex-col items-center justify-center text-center">
                <div class="border-2 border-dashed border-gray-300 rounded-3xl p-12 bg-white/50 max-w-sm">
                    <div class="text-5xl mb-6 opacity-80">📊</div>
                    <h3 class="text-lg font-bold text-gray-700 mb-2">데이터 분석 준비 완료</h3>
                    <p class="text-gray-400 text-sm leading-relaxed">경쟁 게임의 시장 데이터를 불러오려면<br>왼쪽 설정을 완료하고 버튼을 눌러주세요.</p>
                </div>
            </div>

            <div id="state-loading" class="hidden h-full flex flex-col items-center justify-center">
                <div class="loading-spinner mb-6"></div>
                <p id="loadingText" class="text-gray-500 font-bold animate-pulse">데이터 수집 중...</p>
            </div>

            <div id="state-result" class="hidden fade-in space-y-8">
                <div class="flex flex-col md:flex-row md:items-end justify-between border-b-2 border-[#8eadfa] pb-6 gap-4">
                    <div>
                        <span id="resGenre" class="inline-block text-[10px] font-bold text-white bg-[#8eadfa] px-2 py-0.5 rounded mb-2 uppercase"></span>
                        <h3 id="resultTitle" class="text-3xl font-black text-gray-800 tracking-tight"></h3>
                    </div>
                    <button onclick="window.print()" class="text-xs font-bold text-gray-400 hover:text-[#8eadfa] flex items-center gap-1.5 transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
                        PDF 저장
                    </button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-[11px] font-bold text-gray-400 uppercase mb-2">시장 점유율</p>
                        <p class="text-xl font-bold text-blue-600">Top-Tier (35.2%)</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-[11px] font-bold text-gray-400 uppercase mb-2">핵심 타겟</p>
                        <p class="text-xl font-bold text-purple-600">2535 Core Gamers</p>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-[11px] font-bold text-gray-400 uppercase mb-2">긍정 리뷰 비율</p>
                        <p class="text-xl font-bold text-green-600">82.4% (매우 높음)</p>
                    </div>
                </div>

                <div id="resultContent" class="bg-white p-8 md:p-10 rounded-3xl shadow-sm border border-gray-100 text-gray-700 leading-relaxed space-y-8">
                    </div>
            </div>
        </main>
    </div>
</div>

<script>
    const RivalScope = {
        // UI 상태 관리
        states: ['empty', 'loading', 'result'],
        
        switchState(target) {
            this.states.forEach(s => {
                document.getElementById(`state-${s}`).classList.add('hidden');
            });
            document.getElementById(`state-${target}`).classList.remove('hidden');
        },

        async start() {
            const gameName = document.getElementById('gameName').value.trim();
            const genre = document.getElementById('gameGenre').value;
            const focus = document.querySelector('input[name="focus"]:checked').value;
            const startBtn = document.getElementById('startBtn');

            if (!gameName) {
                alert("분석할 게임 이름을 입력해 주세요.");
                document.getElementById('gameName').focus();
                return;
            }

            // 초기화 및 로딩 시작
            this.switchState('loading');
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50', 'cursor-not-allowed');

            // 로딩 텍스트 애니메이션
            const steps = ["메타데이터 수집 중...", "유저 피드백 분석 중...", "리포트 생성 중..."];
            const loadingText = document.getElementById('loadingText');
            
            let i = 0;
            const interval = setInterval(() => {
                if(i < steps.length) loadingText.innerText = steps[i++];
            }, 700);

            // 모의 데이터 로딩 (2.5초)
            setTimeout(() => {
                clearInterval(interval);
                this.renderResult(gameName, genre, focus);
                this.switchState('result');
                
                // 버튼 복구
                startBtn.disabled = false;
                startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }, 2500);
        },

        renderResult(name, genre, focus) {
            document.getElementById('resGenre').innerText = genre;
            document.getElementById('resultTitle').innerText = `${name} 마켓 인텔리전스 리포트`;
            
            const content = document.getElementById('resultContent');
            content.innerHTML = `
                <section class="fade-in">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="w-1.5 h-6 bg-[#8eadfa] rounded-full"></span>
                        <h4 class="text-xl font-bold text-gray-800">1. 전략적 시장 포지셔닝</h4>
                    </div>
                    <p class="pl-5 text-gray-600">
                        <strong>${name}</strong>은(는) 현재 ${genre} 장르 내에서 독보적인 유저 충성도를 확보하고 있습니다. 
                        AI 분석 결과, 경쟁사는 단순한 게임 플레이를 넘어선 <strong>'커뮤니티 결속력'</strong>을 핵심 경쟁력으로 삼고 있으며, 
                        이는 신규 유입 대비 이탈률이 0.8% 미만으로 유지되는 강력한 잠금(Lock-in) 효과를 만듭니다.
                    </p>
                </section>

                <section class="fade-in" style="animation-delay: 0.2s">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="w-1.5 h-6 bg-[#8eadfa] rounded-full"></span>
                        <h4 class="text-xl font-bold text-gray-800">2. 주요 분석 인사이트 (중점: ${focus})</h4>
                    </div>
                    <div class="pl-5 space-y-4">
                        <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                            <span class="font-bold text-[#8eadfa] block mb-1">Critical Insight</span>
                            <p class="text-sm">최근 3개월간 유저 감성 트렌드 분석 시, "업데이트 속도"에 대한 만족도는 높으나 "콘텐츠의 깊이"에 대한 의구심이 증가하고 있습니다. 이 지점이 우리 서비스가 파고들 수 있는 <strong>전략적 틈새</strong>입니다.</p>
                        </div>
                        <ul class="list-disc pl-5 space-y-2 text-sm text-gray-600">
                            <li><strong>BM 구조:</strong> 확률형 아이템 의존도를 낮추고 '확정형 보상' 패키지를 늘려 유저 신뢰도 확보 중</li>
                            <li><strong>유저 경험:</strong> 모바일-PC 크로스 플랫폼 최적화가 유저 체류 시간 증가의 1등 공신</li>
                        </ul>
                    </div>
                </section>

                <div class="bg-[#8eadfa]/10 p-6 rounded-2xl border-l-4 border-[#8eadfa] fade-in" style="animation-delay: 0.4s">
                    <h5 class="font-bold text-[#5c7acc] mb-2 flex items-center gap-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM5.884 6.607a1 1 0 001.415-1.414l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm8.507 8.507a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm-9.914 0a1 1 0 001.414 1.414l.707-.707a1 1 0 00-1.414-1.414l-.707.707zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 100 2h1a1 1 0 100-2h-1z"/></svg>
                        AI 최적화 권고안
                    </h5>
                    <p class="text-sm text-blue-900/80 font-medium">
                        ${name}의 약점인 '중반부 성장 정체 구간'을 공략하기 위해, 우리 게임은 <strong>AI 기반 가이드 시스템</strong>과 
                        <strong>성장 속도 가속화 버프 이벤트</strong>를 런칭 초기에 집중 배치할 것을 추천합니다.
                    </p>
                </div>
            `;
        }
    };

    // 엔터키 지원
    document.getElementById('gameName').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') RivalScope.start();
    });
</script>

</body>
</html>
