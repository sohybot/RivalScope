<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서비스 이용약관 UI</title>
  <style>
    :root{
      /* Theme */
      --brand:#10B981;   /* main */
      --mint:#E8F5F1;    /* card bg */
      --deep:#064E3B;    /* text */
      --gold:#FFD700;    /* accent */
      --bg:#F0F2F5;      /* outer bg */

      /* UI */
      --white:#fff;
      --line: rgba(6,78,59,.14);
      --muted: rgba(6,78,59,.60);
      --shadow: 0 18px 50px rgba(6,78,59,.14);
      --radius: 22px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo","Noto Sans KR", Arial, sans-serif;
      background: var(--bg);
      color: var(--deep);
      display:flex;
      justify-content:center;
      padding: 22px;
    }

    /* Phone frame */
    .phone{
      width: 390px;
      max-width: 94vw;
      border-radius: 34px;
      overflow:hidden;
      box-shadow: 0 28px 70px rgba(0,0,0,.18);
      background: #0c0f12;
      padding: 10px;
    }
    .screen{
      border-radius: 26px;
      overflow:hidden;
      background: linear-gradient(180deg,
        rgba(16,185,129,.35) 0%,
        rgba(16,185,129,.18) 30%,
        rgba(240,242,245,1) 100%);
      min-height: 720px;
      position:relative;
      padding: 18px 16px 18px;
    }

    /* Top bar */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 2px 2px 14px;
      color: rgba(6,78,59,.9);
    }
    .icon-btn{
      width:40px;height:40px;
      border-radius: 14px;
      display:grid;place-items:center;
      background: rgba(255,255,255,.55);
      border: 1px solid rgba(6,78,59,.10);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 24px rgba(6,78,59,.08);
      cursor:pointer;
      user-select:none;
      font-size:18px;
    }
    .icon-btn:active{ transform: scale(.98); }

    /* Main card */
    .card{
      background: rgba(232,245,241,.82);
      border: 1px solid rgba(16,185,129,.22);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    /* Header inside card */
    .card-header{
      padding: 18px 16px 14px;
      background: rgba(255,255,255,.55);
      border-bottom: 1px solid rgba(6,78,59,.10);
      display:flex;
      align-items:center;
      gap: 12px;
    }
    .mascot{
      width:42px;height:42px;
      border-radius: 16px;
      background: radial-gradient(circle at 30% 30%, #fff 0%, rgba(16,185,129,.16) 45%, rgba(16,185,129,.08) 100%);
      border: 1px solid rgba(16,185,129,.22);
      display:grid;place-items:center;
      font-size: 22px;
      flex:0 0 auto;
    }
    .title{
      font-size: 22px;
      font-weight: 950;
      letter-spacing: -0.4px;
    }

    /* Inner panel */
    .panel{
      margin: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,.55);
      border: 2px solid rgba(6,78,59,.45);
      box-shadow: 0 18px 40px rgba(6,78,59,.10);
      overflow:hidden;
    }

    .agree-all{
      display:flex;
      align-items:center;
      gap: 12px;
      padding: 18px 16px;
      background: rgba(232,245,241,.75);
      border-bottom: 1px solid rgba(6,78,59,.12);
    }

    /* Checkbox styles */
    .check{
      display:flex;
      align-items:center;
      gap: 12px;
      font-weight: 900;
      font-size: 20px;
      letter-spacing: -0.2px;
    }

    /* Accessible checkbox */
    input[type="checkbox"]{
      appearance:none;
      -webkit-appearance:none;
      width: 26px;
      height: 26px;
      border-radius: 8px;
      border: 2px solid rgba(6,78,59,.55);
      background: rgba(255,255,255,.65);
      display:grid;
      place-items:center;
      cursor:pointer;
      position:relative;
    }
    input[type="checkbox"]::after{
      content:"";
      width: 12px;
      height: 7px;
      border-left: 3px solid transparent;
      border-bottom: 3px solid transparent;
      transform: rotate(-45deg);
      margin-top: -1px;
    }
    input[type="checkbox"]:checked{
      background: linear-gradient(180deg, rgba(16,185,129,.95), rgba(6,78,59,.92));
      border-color: rgba(16,185,129,1);
      box-shadow: 0 10px 22px rgba(16,185,129,.22);
    }
    input[type="checkbox"]:checked::after{
      border-left-color: #fff;
      border-bottom-color: #fff;
    }
    input[type="checkbox"]:focus-visible{
      outline: 3px solid rgba(255,215,0,.65);
      outline-offset: 3px;
    }

    .agree-all .hint{
      margin-left:auto;
      font-size: 12px;
      color: rgba(6,78,59,.55);
      font-weight: 800;
    }

    /* List */
    .list{
      padding: 10px 10px 12px;
      background: rgba(255,255,255,.62);
    }
    .item{
      display:flex;
      align-items:center;
      gap: 10px;
      padding: 14px 10px;
      border-radius: 14px;
    }
    .item + .item{
      border-top: 1px solid rgba(6,78,59,.10);
      border-radius: 0;
    }
    .item .label{
      flex:1;
      font-size: 14px;
      color: rgba(6,78,59,.92);
      font-weight: 800;
      line-height: 1.25;
    }
    .item .sub{
      display:block;
      font-weight: 700;
      color: rgba(6,78,59,.55);
      font-size: 12px;
      margin-top: 3px;
    }
    .chev{
      width: 34px;
      height: 34px;
      border-radius: 14px;
      background: rgba(16,185,129,.12);
      display:grid;
      place-items:center;
      color: rgba(6,78,59,.75);
      font-weight: 900;
      flex:0 0 auto;
    }

    /* Primary button */
    .cta-wrap{
      padding: 16px;
    }
    .cta{
      width:100%;
      border:0;
      border-radius: 18px;
      padding: 16px 14px;
      font-size: 20px;
      font-weight: 950;
      letter-spacing: -0.2px;
      color: #fff;
      cursor:pointer;
      background: linear-gradient(180deg, rgba(6,78,59,.92) 0%, rgba(6,78,59,1) 100%);
      box-shadow: 0 18px 40px rgba(6,78,59,.22);
      position:relative;
      overflow:hidden;
    }
    .cta::before{
      content:"";
      position:absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 10%, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 45%);
      pointer-events:none;
    }
    .cta:active{ transform: scale(.99); }

    /* Enabled/disabled based on required checks */
    .cta[disabled]{
      cursor:not-allowed;
      opacity:.55;
      filter: grayscale(.2);
    }

    /* Small gold accent chip (optional) */
    .accent{
      display:inline-flex;
      align-items:center;
      gap:6px;
      margin-left:8px;
      font-size: 12px;
      font-weight: 900;
      color: rgba(6,78,59,.9);
      background: rgba(255,215,0,.32);
      border: 1px solid rgba(255,215,0,.55);
      padding: 4px 8px;
      border-radius: 999px;
    }

    /* Make the whole experience look like screenshot */
    .card-pad{ padding-bottom: 6px; }
  </style>
</head>

<body>
  <div class="phone">
    <div class="screen">

      <div class="topbar">
        <div class="icon-btn" aria-label="뒤로가기">←</div>
        <div class="icon-btn" aria-label="도움말">?</div>
      </div>

      <div class="card card-pad">
        <div class="card-header">
          <div class="mascot" aria-hidden="true">🐿️</div>
          <div class="title">서비스 이용약관</div>
        </div>

        <div class="panel">
          <div class="agree-all">
            <label class="check" for="all">
              <input id="all" type="checkbox" />
              <span>전체 동의하기</span>
            </label>
            <span class="hint">필수 2개 포함</span>
          </div>

          <div class="list" role="list">
            <div class="item" role="listitem">
              <input id="t1" type="checkbox" />
              <label class="label" for="t1">
                서비스 이용약관
                <span class="sub">필수</span>
              </label>
              <div class="chev" aria-hidden="true">›</div>
            </div>

            <div class="item" role="listitem">
              <input id="t2" type="checkbox" checked />
              <label class="label" for="t2">
                개인정보 수집 및 이용동의
                <span class="sub">필수</span>
              </label>
              <div class="chev" aria-hidden="true">›</div>
            </div>

            <div class="item" role="listitem">
              <input id="t3" type="checkbox" />
              <label class="label" for="t3">
                마케팅 정보 수신 및 푸시 알림 동의
                <span class="sub">선택 <span class="accent">혜택</span></span>
              </label>
              <div class="chev" aria-hidden="true">›</div>
            </div>
          </div>
        </div>

        <div class="cta-wrap">
          <button class="cta" id="cta" disabled>동의하고 시작하기</button>
        </div>
      </div>

      <script>
        // Required: t1, t2. Optional: t3
        const all = document.getElementById("all");
        const t1  = document.getElementById("t1");
        const t2  = document.getElementById("t2");
        const t3  = document.getElementById("t3");
        const cta = document.getElementById("cta");

        function syncAllCheckbox(){
          const boxes = [t1, t2, t3];
          const checkedCount = boxes.filter(b => b.checked).length;
          all.indeterminate = checkedCount > 0 && checkedCount < boxes.length;
          all.checked = checkedCount === boxes.length;
        }

        function syncCTA(){
          const requiredOk = t1.checked && t2.checked;
          cta.disabled = !requiredOk;
        }

        function update(){
          syncAllCheckbox();
          syncCTA();
        }

        all.addEventListener("change", () => {
          const v = all.checked;
          t1.checked = v;
          t2.checked = v;
          t3.checked = v;
          update();
        });

        [t1, t2, t3].forEach(cb => cb.addEventListener("change", update));

        // initial
        update();

        // optional: click CTA
        cta.addEventListener("click", () => {
          alert("동의 완료! (데모)");
        });
      </script>

    </div>
  </div>
</body>
</html>
