<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RivalScope Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', 'Pretendard', sans-serif; background-color: #f0f0e8; }
        .dashed-border { border: 2px dashed #ccc; }
    </style>
</head>
<body class="bg-[#f0f0e8] p-4">

<div class="w-full max-w-5xl mx-auto bg-[#f7f7f0] rounded-xl shadow-2xl border border-gray-200 overflow-hidden flex flex-col min-h-screen">
        
        <header class="bg-white border-b border-gray-200 p-4 flex items-center gap-3">
            <div class="bg-[#99acff] text-white font-bold p-1 px-2 rounded text-sm">RS</div>
            <h1 class="text-xl font-bold text-gray-800">RivalScope</h1>
            <span class="text-gray-400 text-sm">경쟁 게임 리서치 AI</span>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-80 bg-white border-r border-gray-200 p-6 flex flex-col gap-6">
                <div>
                    <h2 class="text-lg font-bold mb-4">리서치 설정</h2>
                    <hr class="mb-4">
                    
                    <div class="space-y-4 text-sm">
                        <div>
                            <label class="block font-semibold mb-1">경쟁 게임명 (필수)</label>
                            <input id="gameName" type="text" placeholder="예: 원신, 로스트아크..." class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-[#99acff] outline-none">
                        </div>
                        
                        <div>
                            <label class="block font-semibold mb-1">우리 게임 장르</label>
                            <select class="w-full border border-gray-300 rounded p-2">
                                <option>장르 선택</option>
                                <option>수집형 RPG</option>
                                <option>MMORPG</option>
                                <option>액션/어드벤처</option>
                            </select>
                        </div>

                        <div>
                            <label class="block font-semibold mb-1">우리 게임 주요 특징</label>
                            <textarea placeholder="수집형 RPG, 20-35세 타겟..." class="w-full border border-gray-300 rounded p-2 h-24 resize-none focus:ring-2 focus:ring-[#99acff] outline-none"></textarea>
                        </div>

                        <div>
                            <label class="block font-semibold mb-1">중점 분석 항목</label>
                            <select class="w-full border border-gray-300 rounded p-2">
                                <option>전반적 분석</option>
                                <option>과금 모델(BM)</option>
                                <option>코어 루프</option>
                                <option>유저 리뷰 감성 분석</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button onclick="startResearch()" class="w-full bg-[#8eadfa] hover:bg-[#99acff] text-white font-bold py-3 rounded-lg transition-all active:scale-95">
                    리서치 시작
                </button>
            </aside>

            <main id="mainContent" class="flex-1 p-12 overflow-y-auto relative bg-[#f7f7f0]">
                <div id="emptyState" class="dashed-border rounded-xl p-16 text-center text-gray-500 max-w-md bg-white/50">
                    <div class="text-4xl mb-4">❓</div>
                    <p class="font-medium">경쟁 게임명을 입력하고<br>리서치를 시작하세요</p>
                </div>

                <div id="loadingState" class="hidden text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#99acff] mx-auto mb-4"></div>
                    <p class="text-gray-600 font-medium">AI가 데이터를 분석 중입니다...</p>
                </div>

                <div id="resultState" class="hidden w-full h-full overflow-y-auto bg-white p-8 rounded-lg shadow-inner text-left">
                    <h3 id="resultTitle" class="text-2xl font-bold mb-4 text-[#99acff]"></h3>
                    <div id="resultText" class="text-gray-700 leading-relaxed space-y-4"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function startResearch() {
            const gameName = document.getElementById('gameName').value || '입력된 게임';
            const empty = document.getElementById('emptyState');
            const loading = document.getElementById('loadingState');
            const result = document.getElementById('resultState');
            const resultTitle = document.getElementById('resultTitle');
            const resultText = document.getElementById('resultText');

            empty.classList.add('hidden');
            loading.classList.remove('hidden');
            result.classList.add('hidden');

            setTimeout(() => {
                loading.classList.add('hidden');
                result.classList.remove('hidden');
                resultTitle.innerText = `🔍 ${gameName} 분석 보고서`;
                
                resultText.innerHTML = `
                    <p><strong>1. 시장 포지셔닝:</strong> 해당 게임은 현재 서브컬처 시장 내에서 압도적인 점유율을 차지하고 있습니다.</p>
                    <p><strong>2. 주요 성공 요인:</strong> 고퀄리티의 그래픽 연출과 정기적인 대규모 업데이트를 통한 유저 리텐션 확보가 핵심입니다.</p>
                    <p><strong>3. 위험 요소:</strong> 최근 유저들 사이에서 피로도 증가에 대한 목소리가 나오고 있어, 라이트한 콘텐츠 보강이 필요해 보입니다.</p>
                    <hr class="my-4">
                    <p class="text-sm text-gray-400 italic">* 본 데이터는 RivalScope AI에 의해 실시간 생성되었습니다.</p>
                `;
            }, 1500);
        }
    </script>
</body>
</html>
